<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart - Fruits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">🛒 FreshMart</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="fruits.html" class="nav-active">Fruits</a></li>
                    <li><a href="vegetables.html">Vegetables</a></li>
                    <li><a href="dairy.html">Dairy</a></li>
                    <li><a href="chocolates.html">Chocolates</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 50px;">
        <h2 class="section-title">Fresh Fruits</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1560806887-1e4cd0b6caa6?auto=format&fit=crop&q=80&w=400" alt="Apples">
                <div class="card-content">
                    <h3 class="card-title">Fresh Apples</h3>
                    <p class="card-price">$2.99 / kg</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1528825871115-3581a5387919?auto=format&fit=crop&q=80&w=400" alt="Bananas">
                <div class="card-content">
                    <h3 class="card-title">Organic Bananas</h3>
                    <p class="card-price">$1.99 / kg</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1550258122-29d5b762c324?auto=format&fit=crop&q=80&w=400" alt="Oranges">
                <div class="card-content">
                    <h3 class="card-title">Juicy Oranges</h3>
                    <p class="card-price">$3.49 / kg</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1538401344607-4e6783ffce34?auto=format&fit=crop&q=80&w=400" alt="Grapes">
                <div class="card-content">
                    <h3 class="card-title">Green Grapes</h3>
                    <p class="card-price">$4.99 / kg</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 FreshMart. All rights reserved.</p>
    </footer>
</body>
</html>
