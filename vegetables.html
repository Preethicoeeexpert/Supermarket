<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart - Vegetables</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">🛒 FreshMart</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="fruits.html">Fruits</a></li>
                    <li><a href="vegetables.html" class="nav-active">Vegetables</a></li>
                    <li><a href="dairy.html">Dairy</a></li>
                    <li><a href="chocolates.html">Chocolates</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 50px;">
        <h2 class="section-title">Farm Vegetables</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?auto=format&fit=crop&q=80&w=400" alt="Potatoes">
                <div class="card-content">
                    <h3 class="card-title">Organic Potatoes</h3>
                    <p class="card-price">$1.49 / kg</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1563565375-f38b25f46eb2?auto=format&fit=crop&q=80&w=400" alt="Carrots">
                <div class="card-content">
                    <h3 class="card-title">Fresh Carrots</h3>
                    <p class="card-price">$2.29 / kg</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&q=80&w=400" alt="Tomatoes">
                <div class="card-content">
                    <h3 class="card-title">Red Tomatoes</h3>
                    <p class="card-price">$3.99 / kg</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1512621815601-bc8f24add12b?auto=format&fit=crop&q=80&w=400" alt="Broccoli">
                <div class="card-content">
                    <h3 class="card-title">Green Broccoli</h3>
                    <p class="card-price">$2.99 / each</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 FreshMart. All rights reserved.</p>
    </footer>
</body>
</html>
