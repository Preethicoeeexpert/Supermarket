<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart - Chocolates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">🛒 FreshMart</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="fruits.html">Fruits</a></li>
                    <li><a href="vegetables.html">Vegetables</a></li>
                    <li><a href="dairy.html">Dairy</a></li>
                    <li><a href="chocolates.html" class="nav-active">Chocolates</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 50px;">
        <h2 class="section-title">Chocolates & Sweets</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1548907040-4baa42d10919?auto=format&fit=crop&q=80&w=400" alt="Dark Chocolate">
                <div class="card-content">
                    <h3 class="card-title">Dark Chocolate Bar</h3>
                    <p class="card-price">$3.99 / each</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52?auto=format&fit=crop&q=80&w=400" alt="Milk Chocolate">
                <div class="card-content">
                    <h3 class="card-title">Milk Chocolate Truffles</h3>
                    <p class="card-price">$4.49 / box</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1511381939415-e440c05ce0e0?auto=format&fit=crop&q=80&w=400" alt="Assorted Chocolates">
                <div class="card-content">
                    <h3 class="card-title">Assorted Box</h3>
                    <p class="card-price">$12.99 / box</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1582293041079-7814c2f12063?auto=format&fit=crop&q=80&w=400" alt="White Chocolate">
                <div class="card-content">
                    <h3 class="card-title">White Chocolate Bar</h3>
                    <p class="card-price">$2.99 / each</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 FreshMart. All rights reserved.</p>
    </footer>
</body>
</html>
