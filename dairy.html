<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart - Dairy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">🛒 FreshMart</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="fruits.html">Fruits</a></li>
                    <li><a href="vegetables.html">Vegetables</a></li>
                    <li><a href="dairy.html" class="nav-active">Dairy</a></li>
                    <li><a href="chocolates.html">Chocolates</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 50px;">
        <h2 class="section-title">Dairy Products</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1550583724-b2692b85b150?auto=format&fit=crop&q=80&w=400" alt="Milk">
                <div class="card-content">
                    <h3 class="card-title">Whole Milk</h3>
                    <p class="card-price">$3.49 / 1L</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1486297678162-eb2a19b0a32d?auto=format&fit=crop&q=80&w=400" alt="Cheese">
                <div class="card-content">
                    <h3 class="card-title">Cheddar Cheese</h3>
                    <p class="card-price">$5.99 / 500g</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1588713057199-e648f5831cf0?auto=format&fit=crop&q=80&w=400" alt="Butter">
                <div class="card-content">
                    <h3 class="card-title">Unsalted Butter</h3>
                    <p class="card-price">$4.29 / 250g</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&q=80&w=400" alt="Yogurt">
                <div class="card-content">
                    <h3 class="card-title">Greek Yogurt</h3>
                    <p class="card-price">$2.99 / 400g</p>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 FreshMart. All rights reserved.</p>
    </footer>
</body>
</html>
